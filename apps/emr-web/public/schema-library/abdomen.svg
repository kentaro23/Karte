<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260" role="img" aria-label="腹部（4分割）">
  <rect width="240" height="260" fill="#ffffff"/>
  <g fill="none" stroke="#5b6b7a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- trunk outline (costal margin to pelvis) -->
    <path d="M52 36 Q120 12 188 36 L184 70
             C184 70 196 120 184 180
             Q160 224 120 232 Q80 224 56 180
             C44 120 56 70 56 70 Z"/>
    <!-- costal margin -->
    <path d="M56 70 Q120 96 184 70" stroke-width="1.4"/>
    <!-- inguinal lines -->
    <path d="M70 210 Q120 196 170 210" stroke-width="1.4"/>
    <!-- umbilicus -->
    <circle cx="120" cy="134" r="5"/>
    <!-- quadrant divider lines -->
    <path d="M120 70 L120 224" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M52 134 L188 134" stroke-width="1" stroke-dasharray="4 4"/>
  </g>
  <g font-family="sans-serif" font-size="11" fill="#9aa6b2" text-anchor="middle">
    <text x="92" y="106">RUQ</text>
    <text x="150" y="106">LUQ</text>
    <text x="92" y="176">RLQ</text>
    <text x="150" y="176">LLQ</text>
  </g>
  <text x="120" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9aa6b2">腹部（4分割）</text>
</svg>
